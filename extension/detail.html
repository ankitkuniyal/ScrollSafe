<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrollSafe Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="detail.css">
</head>
<body>
    <div class="glass-bg"></div>
    
    <header class="app-header">
        <div class="logo">
            <img src="logo.svg" alt="ScrollSafe" width="28" height="28" />
            ScrollSafe Intelligence
        </div>
        <button id="download-pdf-btn" style="margin-left:auto; display:none; align-items:center; gap:8px; padding:8px 16px; border:none; background:var(--color-brand); color:white; font-weight:700; font-size:12px; border-radius:20px; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px; transition:transform 0.2s;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Download PDF
        </button>
    </header>

    <div class="app-container">
        <main id="report-content" class="scrollable">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Decoding Reality...</p>
            </div>
        </main>
    </div>

    <script src="html2pdf.bundle.min.js"></script>
    <script src="detail.js"></script>
</body>
</html>
