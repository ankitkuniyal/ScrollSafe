<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: transparent !important;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        svg {
            width: 512px;
            height: 512px;
        }
    </style>
</head>
<body>
    <div id="logo-container"></div>
    <script>
        fetch('extension/logo.svg')
            .then(r => r.text())
            .then(text => {
                document.getElementById('logo-container').innerHTML = text;
                const svgs = document.getElementsByTagName('svg');
                if (svgs.length > 0) {
                    svgs[0].setAttribute('width', '512');
                    svgs[0].setAttribute('height', '512');
                    svgs[0].setAttribute('viewBox', '0 0 59 40');
                }
            });
    </script>
</body>
</html>
